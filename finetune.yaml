defaults:
  - agent: ddpg
  - override hydra/launcher: submitit_local

# mode
reward_free: false
# task settings
task: walker_stand
obs_type: states # [states, pixels]
frame_stack: 3 # only works if obs_type=pixels
action_repeat: 2
discount: 0.99
# train settings
num_train_frames: 100010
num_seed_frames: 4000
# eval
eval_every_frames: 10000
num_eval_episodes: 10
# pretrained
snapshot_ts: 100000
snapshots: [100000]
# snapshot_base_dir: ./models
snapshot_base_dir: /mnt/faster0/bm844/models
# replay buffer
replay_buffer_size: 1000000
replay_buffer_num_workers: 0
batch_size: ${agent.batch_size}
nstep: ${agent.nstep}
update_encoder: false # can be either true or false depending if we want to fine-tune encoder
# misc
seed: 1
device: cuda
save_video: false
save_train_video: false
use_tb: false
use_wandb: false
# experiment
experiment: finetune


hydra:
  run:
    dir: /mnt/faster0/bm844/exp_local/finetune/${now:%Y.%m.%d}/${now:%H%M%S}_${agent.name}_${task}_seed${seed}
  sweep:
    dir: /mnt/faster0/bm844/exp_sweep/finetune/${now:%Y.%m.%d}/${now:%H%M}_${agent.name}_${task}
    subdir: seed${seed}

  launcher:
    timeout_min: 4300
    cpus_per_task: 10
    gpus_per_node: 1
    tasks_per_node: 1
    mem_gb: 160
    nodes: 1
    submitit_folder: /mnt/fast0/bm844/exp_sweep/${now:%Y.%m.%d}/${now:%H%M}_${agent.name}_${experiment}/.slurm
num_init_steps: 4096   # probe phase length — matches APS/LGSD yaml values
snapshot_path: null