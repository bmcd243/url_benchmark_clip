defaults:
  - agent: ddpg
  # - override hydra/launcher: submitit_local

# mode
reward_free: true
# task settings
domain: walker # primal task will be infered in runtime
obs_type: pixels # [states, pixels]
frame_stack: 3 # only works if obs_type=pixels
action_repeat: 2
discount: 0.99
# train settings
num_train_frames: 2000010
num_seed_frames: 4000
# eval
eval_every_frames: 100000
num_eval_episodes: 10
# snapshot
snapshots: [100000, 500000, 1000000, 2000000]
# snapshot_dir: ../../../models/${obs_type}/${domain}/${agent.name}/${seed}
snapshot_dir: /mnt/faster0/bm844/models/${obs_type}/${domain}/${agent.name}/${seed}
# replay buffer
replay_buffer_size: 500000
replay_buffer_num_workers: 0
batch_size: ${agent.batch_size}
nstep: ${agent.nstep}
update_encoder: true # should always be true for pre-training
# misc
seed: 1
device: cuda
save_video: false
save_train_video: false
use_tb: false
use_wandb: false
# experiment
experiment: pretrain


hydra:
  run:
    dir: /mnt/faster0/bm844/exp_local/pretrain/${now:%Y.%m.%d}/${now:%H%M%S}_${agent.name}
  sweep:
    dir: /mnt/faster0/bm844/exp_sweep/pretrain/${now:%Y.%m.%d}/${now:%H%M}_${agent.name}_${experiment}
    subdir: ${hydra.job.num}



