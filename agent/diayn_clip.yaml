# @package agent
_target_: agent.diayn.DIAYNAgent
name: diayn_clip
reward_free: ${reward_free}
obs_type: ???
obs_shape: ???
action_shape: ???
device: ${device}
lr: 1e-4
critic_target_tau: 0.01
update_every_steps: 2
use_tb: ${use_tb}
use_wandb: ${use_wandb}
num_expl_steps: ???
hidden_dim: 1024
feature_dim: 256      # increased from 50: CLIP's 3072-dim embedding requires
                      # a less aggressive bottleneck than the CNN's 39200-dim
                      # output. The discriminator and actor/critic operate on
                      # the full embedding directly; feature_dim only affects
                      # the actor/critic trunk projection.
stddev_schedule: 0.2
stddev_clip: 0.3
nstep: 3
batch_size: 256
init_critic: true
update_encoder: false  # CLIP weights are frozen throughout
encoder_type: clip
clip_normalize: true
update_encoder: false

clip_model_name: ViT-B-32
clip_pretrained: openai
 
# DIAYN-specific
skill_dim: 16
diayn_scale: 1.0
update_skill_every_step: 50
