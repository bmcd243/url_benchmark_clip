# agent/lgsd.yaml
# @package agent
_target_: agent.lgsd.LGSDAgent
name: lgsd
reward_free: ${reward_free}
obs_type: ???
obs_shape: 512
action_shape: ???
device: ${device}
lr: 1e-4
critic_target_tau: 0.01
update_every_steps: 2
use_tb: ${use_tb}
use_wandb: ${use_wandb}
num_expl_steps: ???
hidden_dim: 1024
feature_dim: 50
stddev_schedule: 0.2
stddev_clip: 0.3
nstep: 3
batch_size: 1024
init_critic: true
update_encoder: ${update_encoder}

# LGSD-specific
skill_dim: 8
lgsd_scale: 1.0

# Lagrange multiplier for Lipschitz constraint
# LGSD uses lambda_init=300 but that is for Isaac Gym scale
# Start lower for DMControl reward magnitudes
lagrange_init: 10.0
lagrange_lr: 0.01
lipschitz_epsilon: 0.01