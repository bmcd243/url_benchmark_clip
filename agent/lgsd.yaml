# @package agent
_target_: agent.lgsd.LGSDAgent
name: lgsd_clip
reward_free: ${reward_free}
obs_type: ???
obs_shape: ???
action_shape: ???
device: ${device}
lr: 1e-4
critic_target_tau: 0.01
update_every_steps: 2
use_tb: ${use_tb}
use_wandb: ${use_wandb}
num_expl_steps: ???
hidden_dim: 1024
feature_dim: 256      # increased from 50: CLIP's 3072-dim embedding requires
                      # a less aggressive bottleneck than the CNN's 39200-dim
                      # output. The trajectory encoder phi and the Lipschitz
                      # constraint operate on the full CLIP embedding directly;
                      # feature_dim only affects the actor/critic trunk.
stddev_schedule: 0.2
stddev_clip: 0.3
nstep: 3
batch_size: 256
init_critic: true
update_encoder: false  # CLIP weights are frozen throughout
encoder_type: clip

clip_model_name: ViT-B-32
clip_pretrained: openai

# LGSD-specific
skill_dim: 8

# Lagrange multiplier for Lipschitz constraint.
# Enforces ||phi(e') - phi(e)|| <= d_CLIP(o, o') on adjacent state pairs,
# where d_CLIP is the cosine distance in CLIP embedding space.
# Following LGSD (Rho et al., 2025) Algorithm 1, lines 16-17.
# lambda increases when constraint is violated, decreases otherwise,
# clamped at zero to maintain lambda >= 0.
lagrange_init: 100.0    # closer to paper's 300, strong early constraint
lagrange_lr: 0.001      # slower decay — noisier batch estimates need stability
lgsd_scale: 10.0        # amplify reward signal to compete with entropy
lipschitz_epsilon: 0.1  # looser cap — DDPG updates are smaller than PPO